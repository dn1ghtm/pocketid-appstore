<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="#1e293b" stroke="#64748b" stroke-width="2"/>

  <!-- Passkey icon (key shape) -->
  <g transform="translate(40, 40)">
    <!-- Key shaft -->
    <rect x="8" y="20" width="28" height="8" rx="2" fill="#3b82f6"/>

    <!-- Key head (circle) -->
    <circle cx="16" cy="24" r="12" fill="none" stroke="#3b82f6" stroke-width="3"/>
    <circle cx="16" cy="24" r="6" fill="#3b82f6"/>

    <!-- Teeth -->
    <rect x="36" y="20" width="4" height="4" fill="#3b82f6"/>
    <rect x="42" y="20" width="4" height="4" fill="#3b82f6"/>
  </g>

  <!-- Badge for modern/security -->
  <circle cx="98" cy="98" r="14" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="98" y="103" text-anchor="middle" fill="white" font-size="18" font-weight="bold">✓</text>
</svg>
