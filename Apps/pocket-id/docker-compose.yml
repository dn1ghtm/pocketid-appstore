name: pocket-id
services:
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    container_name: pocket-id
    restart: unless-stopped
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      POCKET_ID_PORT: 1411
    ports:
      - target: 1411
        published: $WebUI_PORT
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/data
        target: /app/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:1411/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    x-casaos:
      envs:
        - key: PUID
          description:
            en_us: "User ID for running the container"
        - key: PGID
          description:
            en_us: "Group ID for running the container"
        - key: TZ
          description:
            en_us: "Timezone (e.g., UTC, America/New_York)"
      ports:
        - container_port: 1411
          description:
            en_us: "Pocket ID web interface port"
      volumes:
        - container_path: /app/data
          description:
            en_us: "Persistent data storage for Pocket ID configuration and database"

x-casaos:
  architectures:
    - amd64
    - arm64
  main: pocket-id
  author: Pocket ID Contributors
  category: Authentication
  developer: Pocket ID
  icon: https://raw.githubusercontent.com/pocket-id/pocket-id/main/public/logo.svg
  tagline:
    en_us: "Self-hosted passkey OIDC provider"
  title:
    en_us: "Pocket ID"
  description:
    en_us: "Pocket ID is a simple and easy-to-use OIDC provider that allows users to authenticate with their passkeys to your services. A self-hosted alternative to external authentication providers, giving you complete control over your identity management infrastructure."
  port_map: "1411"
  tips:
    en_us: |
      - First access the web interface at http://localhost:$WebUI_PORT
      - Create your first account and configure your passkey
      - Use Pocket ID as an OIDC provider for your applications
      - Supports integration with any service that implements OIDC protocol
  website: https://pocket-id.org
  source_code: https://github.com/pocket-id/pocket-id
  documentation: https://pocket-id.org/docs
